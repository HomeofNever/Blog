# Blog development environment - matches CI (Ubuntu + Node 22)
# Usage: distrobox assemble create

[blog-dev]
image=ubuntu:24.04
pull=true
replace=true
init=false

# Install Node.js 22 via NodeSource + Yarn
additional_packages="curl ca-certificates gnupg git"
init_hooks="curl -fsSL https://deb.nodesource.com/setup_22.x | bash - && apt-get install -y nodejs && corepack enable && corepack prepare yarn@stable --activate"
